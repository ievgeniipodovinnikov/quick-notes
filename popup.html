<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 Quick Notes</h1>
    </div>

    <div class="note-editor">
      <textarea id="note-input" rows="4" placeholder="Write your note here..."></textarea>
      <div class="editor-buttons">
        <button id="save-note" class="btn btn-primary">💾 Save</button>
        <button id="clear-input" class="btn btn-secondary">🗑️ Clear</button>
      </div>
    </div>

    <div class="notes-header">
      <span>📌 My Notes</span>
      <button id="clear-all" class="clear-all-btn">Clear all</button>
    </div>

    <div id="notes-list" class="notes-list">
      <div class="empty-state">No notes yet. Write something above.</div>
    </div>

    <div class="footer">
      <span>© 2026 <a href="https://ievgenii.com" target="_blank">ievgenii.com</a></span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
